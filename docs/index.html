<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franco — Study Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f; --surface: #161618; --surface2: #1e1e21;
    --border: #2a2a2e; --text: #f0f0f0; --muted: #666; --dim: #444;
    --mow: #F5C518; --mpr: #2952A3; --msd: #3B6EC4;
    --mjj: #9EA8B3; --wtw256: #8B1A2B; --wtw258: #F4736A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 2rem 1.5rem 4rem; }
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    background-size: 200px; }
  .wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .logo { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo span { color: var(--mow); }
  .meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: right; line-height: 1.9; }
  .focus-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--mow); border-radius: 8px; padding: 1.5rem 1.75rem; margin-bottom: 2.5rem; }
  .focus-card::before { content: 'FOCUS TODAY'; font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.15em; color: var(--mow); display: block; margin-bottom: 0.75rem; }
  .focus-text { font-size: 1rem; line-height: 1.75; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; }
  .deadlines { margin-bottom: 3rem; }
  .deadline-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .deadline-item { display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 1rem; padding: 0.8rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; transition: border-color 0.2s; }
  .deadline-item:hover { border-color: var(--dim); }
  .deadline-item.urgent { border-left: 2px solid #ff4444; }
  .deadline-item.soon { border-left: 2px solid var(--mow); }
  .deadline-item.upcoming { border-left: 2px solid var(--dim); }
  .deadline-date { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); line-height: 1.5; }
  .deadline-date .dn { font-size: 1.1rem; font-weight: 700; color: var(--text); display: block; font-family: 'Syne', sans-serif; }
  .deadline-title { font-size: 0.85rem; font-weight: 600; line-height: 1.4; }
  .deadline-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .course-pill { font-family: 'DM Mono', monospace; font-size: 0.58rem; font-weight: 500; padding: 3px 8px; border-radius: 4px; white-space: nowrap; letter-spacing: 0.04em; }
  .days-badge { font-family: 'DM Mono', monospace; font-size: 0.58rem; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .days-badge.urgent { background: rgba(255,68,68,0.15); color: #ff6666; }
  .days-badge.soon { background: rgba(245,197,24,0.15); color: var(--mow); }
  .days-badge.ok { background: rgba(255,255,255,0.05); color: var(--muted); }
  .modules { margin-bottom: 3rem; }
  .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
  .module-card:hover { transform: translateY(-2px); border-color: var(--dim); }
  .module-header { padding: 1rem 1.25rem 0.875rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
  .module-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .module-name { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; }
  .module-count { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-left: auto; }
  .module-body { padding: 0.875rem 1.25rem; }
  .module-deadline { display: flex; justify-content: space-between; align-items: baseline; padding: 0.4rem 0; border-bottom: 1px solid var(--border); gap: 0.5rem; }
  .module-deadline:last-of-type { border-bottom: none; }
  .mdt { font-size: 0.78rem; color: var(--text); line-height: 1.3; flex: 1; }
  .mdd { font-family: 'DM Mono', monospace; font-size: 0.63rem; color: var(--muted); white-space: nowrap; }
  .module-doc { margin-top: 0.6rem; padding: 0.6rem 0.75rem; background: var(--surface2); border-radius: 5px; border-left: 2px solid var(--dim); }
  .mdfn { font-size: 0.72rem; font-weight: 600; margin-bottom: 3px; }
  .mdfs { font-size: 0.69rem; color: var(--muted); line-height: 1.5; }
  .mdft { font-family: 'DM Mono', monospace; font-size: 0.56rem; color: var(--dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .no-items { color: var(--dim); font-size: 0.7rem; font-family: 'DM Mono', monospace; padding: 0.4rem 0; }
  .empty-state { padding: 3rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; color: var(--muted); }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--mow); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:600px){body{padding:1.25rem 1rem 3rem;}header{flex-direction:column;gap:0.5rem;}.meta{text-align:left;}.deadline-item{grid-template-columns:65px 1fr;}.deadline-item .bp{display:none;}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap" id="app">
  <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
</div>
<script>
const CC = {"_190939_1":"#F5C518","_188765_1":"#3B6EC4","_191012_1":"#8B1A2B","_190953_1":"#F4736A","_189590_1":"#9EA8B3","_189473_1":"#2952A3"};

function days(s){if(!s)return 999;const n=new Date();n.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.ceil((d-n)/86400000);}
function fmtDate(s){if(!s)return '';const d=new Date(s);return d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});}
function urg(s){const d=days(s);return d<=2?'urgent':d<=7?'soon':'upcoming';}
function badge(s){const d=days(s);const c=d<=2?'urgent':d<=7?'soon':'ok';const l=d===0?'TODAY':d===1?'TMR':`${d}d`;return `<span class="days-badge ${c}">${l}</span>`;}
function pill(id,name){const c=CC[id]||'#666';const n=(name||'').split(' ').slice(0,2).join(' ');return `<span class="course-pill bp" style="background:${c}22;color:${c}">${n}</span>`;}

function renderDeadlines(dl){
  if(!dl?.length)return '<div class="empty-state">No upcoming deadlines.</div>';
  return dl.slice(0,20).map(d=>{
    const dt=d.due_date?new Date(d.due_date):null;
    const dn=dt?dt.getDate():'?';
    const mn=dt?dt.toLocaleDateString('en-ZA',{month:'short'}):'';
    return `<div class="deadline-item ${urg(d.due_date)}">
      <div class="deadline-date"><span class="dn">${dn}</span>${mn}</div>
      <div><div class="deadline-title">${d.title}</div><div class="deadline-meta">${d.label||''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">${pill(d.course_id,d.course_name)}${badge(d.due_date)}</div>
    </div>`;
  }).join('');
}

function renderCard(id,c){
  const color=c.color||CC[id]||'#666';
  const dl=(c.deadlines||[]).slice(0,4);
  const docs=(c.new_documents||[]).slice(0,2);
  const dlRows=dl.map(d=>`<div class="module-deadline"><div class="mdt">${d.title}</div><div class="mdd">${fmtDate(d.due_date)}</div></div>`).join('');
  const docRows=docs.map(d=>`<div class="module-doc"><div class="mdfn">${d.filename}</div><div class="mdfs">${d.summary||''}</div><div class="mdft">${(d.type||'').replace(/_/g,' ')}</div></div>`).join('');
  return `<div class="module-card">
    <div class="module-header"><div class="module-dot" style="background:${color}"></div><div class="module-name">${c.name}</div><div class="module-count">${c.deadlines?.length||0} due</div></div>
    <div class="module-body">${dlRows||'<div class="no-items">No upcoming deadlines</div>'}${docRows}</div>
  </div>`;
}

async function init(){
  try{
    const r=await fetch('dashboard.json?t='+Date.now());
    if(!r.ok)throw new Error();
    const d=await r.json();
    document.getElementById('app').innerHTML=`
      <header>
        <div class="logo">Franco<span>.</span>study</div>
        <div class="meta">Synced: ${d.generated_at_human||'—'}<br>${d.total_upcoming_deadlines||0} upcoming deadlines</div>
      </header>
      <div class="focus-card"><div class="focus-text">${d.focus_today||''}</div></div>
      <div class="deadlines"><div class="section-label">Upcoming deadlines</div><div class="deadline-list">${renderDeadlines(d.all_deadlines)}</div></div>
      <div class="modules"><div class="section-label">Modules</div><div class="module-grid">${Object.entries(d.courses||{}).map(([id,c])=>renderCard(id,c)).join('')}</div></div>`;
  }catch(e){
    document.getElementById('app').innerHTML=`<header><div class="logo">Franco<span>.</span>study</div></header><div class="empty-state" style="margin-top:4rem"><p>Dashboard not yet generated.</p><p style="font-family:'DM Mono',monospace;font-size:0.7rem;color:#444;margin-top:0.5rem">Run the agent to populate data.</p></div>`;
  }
}
init();
</script>
</body>
</html>
